services:
  postgres:
    image: postgres:16-alpine
    container_name: virtuprose-email-agent-postgres
    environment:
      POSTGRES_USER: email_agent
      POSTGRES_PASSWORD: email_agent
      POSTGRES_DB: email_agent
    ports:
      - "54329:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U email_agent -d email_agent"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: virtuprose-email-agent-redis
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
